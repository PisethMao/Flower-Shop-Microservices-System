name: event-driven-infra
services:
  debezium-kafka-connect:
    build: .
    image: debezium-kafka-connect
    container_name: debezium-kafka-connect
    restart: unless-stopped
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
      - schema-registry
    ports:
      - "8086:8083"
    environment:
      GROUP_ID: cdc_connect_group
      BOOTSTRAP_SERVERS: "PLAINTEXT://kafka-1:9093,PLAINTEXT://kafka-2:9093,PLAINTEXT://kafka-3:9093"
      CONFIG_STORAGE_TOPIC: "my_connect_configs"
      OFFSET_STORAGE_TOPIC: "my_connect_offsets"
      STATUS_STORAGE_TOPIC: "my_connect_statuses"
      KEY_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      VALUE_CONVERTER: "io.confluent.connect.avro.AvroConverter"
      CONFLUENT_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONFLUENT_SCHEMA_REGISTRY_URL_VALUE: "http://schema-registry:8081"
      CONNECT_REST_ADVERTISED_HOST_NAME: "debezium-kafka-connect"
      CONNECT_REST_PORT: 8082
    volumes:
      - ./secrets:/etc/kafka-connect/secrets
      - ./config:/etc/kafka-connect/config
    networks:
      - itp-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.6
    container_name: schema-registry
    restart: unless-stopped
    ports:
      - "8084:8081"
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_DEBUG: "true"
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: "_schemas"
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 3
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "PLAINTEXT://kafka-1:9093,PLAINTEXT://kafka-2:9093,PLAINTEXT://kafka-3:9093"
    volumes:
      - ./secrets:/etc/schema-registry/secrets
    networks:
      - itp-net

  kafka-1:
    # image: confluentinc/cp-kafka:7.8.7
    image: apache/kafka:4.2.0
    container_name: kafka-1
    restart: unless-stopped
    ports:
      - "29095:9095"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9094,2@kafka-2:9094,3@kafka-3:9094"
      KAFKA_LISTENERS: "PLAINTEXT://:9093,CONTROLLER://:9094,EXTERNAL://:9095"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:9093,EXTERNAL://localhost:29095"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "o7yIMtiAT9e9gYkU5crhDQ"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      - kafka_1_vol:/var/lib/kafka/data
    networks:
      - itp-net

  kafka-2:
    # image: confluentinc/cp-kafka:7.8.7
    image: apache/kafka:4.2.0
    container_name: kafka-2
    restart: unless-stopped
    ports:
      - "29096:9095"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9094,2@kafka-2:9094,3@kafka-3:9094"
      KAFKA_LISTENERS: "PLAINTEXT://:9093,CONTROLLER://:9094,EXTERNAL://:9095"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-2:9093,EXTERNAL://localhost:29096"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "o7yIMtiAT9e9gYkU5crhDQ"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      # - ./secrets:/etc/kafka/secrets
      # - ./config:/etc/kafka/config
      - kafka_2_vol:/var/lib/kafka/data
    networks:
      - itp-net

  kafka-3:
    # image: confluentinc/cp-kafka:7.8.7
    image: apache/kafka:4.2.0
    container_name: kafka-3
    restart: unless-stopped
    ports:
      - "29097:9095"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9094,2@kafka-2:9094,3@kafka-3:9094"
      KAFKA_LISTENERS: "PLAINTEXT://:9093,CONTROLLER://:9094,EXTERNAL://:9095"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-3:9093,EXTERNAL://localhost:29097"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "o7yIMtiAT9e9gYkU5crhDQ"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      # - ./secrets:/etc/kafka/secrets
      # - ./config:/etc/kafka/config
      - kafka_3_vol:/var/lib/kafka/data
    networks:
      - itp-net

  kafka-ui:
    # image: provectuslabs/kafka-ui
    image: kafbat/kafka-ui:ec46dff
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "18001:8080"
    environment:
      AUTH_TYPE: "LOGIN_FORM"
      SPRING_SECURITY_USER_NAME: "admin"
      SPRING_SECURITY_USER_PASSWORD: "Piseth1711*#"
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-1:9093,kafka-2:9093,kafka-3:9093"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema-registry-itp:8081"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: "debezium-kafka-connect"
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: "http://debezium-kafka-connect-itp:8082"
    volumes:
      - kafka_ui_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
      - schema-registry
      - debezium-kafka-connect
    networks:
      - itp-net

volumes:
  kafka_1_vol:
  kafka_2_vol:
  kafka_3_vol:
  kafka_ui_data:
  secrets:
  config:

networks:
  itp-net:
    external: true