server:
  port: 9099
spring:
  application:
    name: gateway-server
  config:
    import: optional:configserver:http://localhost:8088/
  profiles:
    active: dev
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8762/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
